<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>계측 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#E9EDEC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="계측 기록">
<style>
  :root{
    --paper:#E9EDEC;
    --card:#F5F8F7;
    --grid:#CFD9D6;
    --grid-soft:#DFE7E5;
    --ink:#16211F;
    --ink-soft:#63726F;
    --ink-faint:#98A6A3;
    --noise:#AEBAB7;
    --signal:#1C5B4F;
    --amber:#A8722A;
    --rule:#D5DEDB;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --sans:"IBM Plex Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper)}
  body{
    font-family:var(--sans);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:0 0 64px;
    line-height:1.6;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 20px}

  /* ── header ── */
  header{
    padding:32px 0 20px;
    border-bottom:1px solid var(--rule);
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  }
  .mark{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-soft);
  }
  .today-date{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.06em}

  /* ── entry ── */
  .entry{padding:28px 0 24px;border-bottom:1px solid var(--rule)}
  .entry-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;
  }
  .date-row{display:flex;align-items:stretch;gap:6px;margin-bottom:10px}
  .daybtn{
    width:34px;flex:none;border:1px solid var(--grid);background:var(--card);
    border-radius:2px;color:var(--ink-soft);cursor:pointer;font-size:10px;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .daybtn:hover:not(:disabled){border-color:var(--signal);color:var(--signal)}
  .daybtn:disabled{opacity:.3;cursor:default}
  .datefield{
    flex:1;background:var(--card);border:1px solid var(--grid);border-radius:2px;
    display:flex;align-items:center;padding:0 12px;
  }
  .datefield:focus-within{border-color:var(--signal)}
  input[type=date]{
    width:100%;border:0;background:transparent;outline:none;color:var(--ink);
    font-family:var(--mono);font-size:13px;padding:9px 0;letter-spacing:.02em;
  }
  .todaybtn{
    flex:none;border:1px solid var(--grid);background:var(--card);border-radius:2px;
    color:var(--ink-soft);cursor:pointer;padding:0 12px;
    font-family:var(--mono);font-size:10px;letter-spacing:.08em;transition:.15s;
  }
  .todaybtn:hover:not(:disabled){border-color:var(--signal);color:var(--signal)}
  .todaybtn:disabled{opacity:.35;cursor:default}
  .daybtn:focus-visible,.todaybtn:focus-visible,.del:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .entry-row{display:flex;align-items:stretch;gap:10px}
  .field{
    position:relative;flex:1;
    background:var(--card);border:1px solid var(--grid);border-radius:2px;
  }
  .field:focus-within{border-color:var(--signal);box-shadow:0 0 0 2px rgba(28,91,79,.12)}
  input[type=number]{
    width:100%;border:0;background:transparent;outline:none;
    font-family:var(--mono);font-size:38px;font-weight:500;
    color:var(--ink);padding:14px 52px 14px 16px;letter-spacing:-.02em;
    -moz-appearance:textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input::placeholder{color:var(--ink-faint);font-weight:400}
  .unit{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);
    font-family:var(--mono);font-size:14px;color:var(--ink-faint);pointer-events:none;
  }
  button.save{
    border:0;border-radius:2px;background:var(--signal);color:#F5F8F7;
    font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.02em;
    padding:0 24px;cursor:pointer;transition:background .15s;
  }
  button.save:hover{background:#164a40}
  button.save:disabled{background:var(--ink-faint);cursor:default}
  button.save:focus-visible,.linkbtn:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .ack{
    font-size:13px;color:var(--ink-soft);margin-top:12px;min-height:20px;
    opacity:0;transition:opacity .3s;
  }
  .ack.on{opacity:1}

  /* ── chart (signature) ── */
  .chart-block{padding:30px 0 24px;border-bottom:1px solid var(--rule)}
  .chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .chart-title{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
  .legend{display:flex;gap:16px;font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
  .legend i{display:inline-block;vertical-align:middle;margin-right:6px}
  .lg-dot{width:7px;height:7px;border:1.4px solid var(--noise);border-radius:50%;background:transparent}
  .lg-line{width:16px;height:2.5px;background:var(--signal);border-radius:2px}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .empty-chart{
    padding:44px 20px;text-align:center;color:var(--ink-faint);font-size:13px;
    background:var(--card);border:1px dashed var(--grid);border-radius:2px;
  }

  /* ── verdict ── */
  .verdict{padding:30px 0 26px;border-bottom:1px solid var(--rule)}
  .v-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:16px}
  .v-main{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .v-delta{font-family:var(--mono);font-size:52px;font-weight:600;letter-spacing:-.03em;line-height:1}
  .v-delta.good{color:var(--signal)}
  .v-delta.hold{color:var(--amber)}
  .v-delta.wait{color:var(--ink-faint)}
  .v-tag{
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    padding:5px 10px;border-radius:2px;border:1px solid currentColor;
  }
  .v-tag.good{color:var(--signal)}
  .v-tag.hold{color:var(--amber)}
  .v-tag.wait{color:var(--ink-faint)}
  .v-note{font-size:13px;color:var(--ink-soft);margin-top:14px;max-width:52ch}
  .v-cmp{
    display:flex;gap:0;margin-top:20px;border:1px solid var(--grid);border-radius:2px;
    background:var(--card);overflow:hidden;
  }
  .v-cmp div{flex:1;padding:12px 14px;border-right:1px solid var(--grid)}
  .v-cmp div:last-child{border-right:0}
  .v-cmp dt{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
  .v-cmp dd{font-family:var(--mono);font-size:19px;font-weight:500;color:var(--ink)}
  .v-cmp dd small{font-size:11px;color:var(--ink-faint);font-weight:400;margin-left:3px}

  /* ── progress ── */
  .prog{padding:28px 0 26px;border-bottom:1px solid var(--rule)}
  .track{position:relative;height:3px;background:var(--grid-soft);border-radius:2px;margin:22px 0 10px}
  .fill{position:absolute;left:0;top:0;height:100%;background:var(--signal);border-radius:2px;transition:width .5s}
  .pin{position:absolute;top:-5px;width:1px;height:13px;background:var(--ink-faint)}
  .pin span{
    position:absolute;top:16px;left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-size:9px;color:var(--ink-faint);white-space:nowrap;
  }
  .prog-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:24px}

  /* ── footer tools ── */
  .tools{padding:24px 0;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .linkbtn{
    background:none;border:0;padding:0;cursor:pointer;
    font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-faint);border-bottom:1px solid var(--grid);
  }
  .linkbtn:hover{color:var(--signal);border-color:var(--signal)}
  .log{margin-top:8px;display:none}
  .log.on{display:block}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  th{
    text-align:left;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:400;padding:8px 0;border-bottom:1px solid var(--rule);
  }
  td{padding:9px 0;border-bottom:1px solid var(--grid-soft);color:var(--ink-soft)}
  td.w{color:var(--ink);font-weight:500}
  td.avg{color:var(--signal)}
  td:last-child{text-align:right}
  .jump{
    background:none;border:0;padding:0;cursor:pointer;color:var(--ink-soft);
    font-family:var(--mono);font-size:12px;border-bottom:1px solid transparent;
  }
  .jump:hover{color:var(--signal);border-color:var(--signal)}
  .jump:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .del{background:none;border:0;color:var(--ink-faint);cursor:pointer;font-family:var(--mono);font-size:11px;padding:2px 6px}
  .del:hover{color:#8a3a2a}

  .disc{
    margin-top:28px;font-size:11px;line-height:1.7;color:var(--ink-faint);
    border-top:1px solid var(--rule);padding-top:18px;
  }
  @media (max-width:420px){
    input[type=number]{font-size:30px;padding:12px 44px 12px 13px}
    .v-delta{font-size:42px}
    button.save{padding:0 18px;font-size:13px}
    .legend{gap:12px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="mark">계측 기록 / Weight Log</div>
    <div class="today-date" id="todayDate"></div>
  </header>

  <!-- 입력 -->
  <section class="entry">
    <div class="entry-label">계측값 — 기상 직후 · 화장실 후 · 같은 옷</div>
    <div class="date-row">
      <button class="daybtn" id="prevDay" aria-label="이전 날짜">◀</button>
      <div class="datefield">
        <input type="date" id="d" aria-label="기록할 날짜">
      </div>
      <button class="daybtn" id="nextDay" aria-label="다음 날짜">▶</button>
      <button class="todaybtn" id="todayBtn">오늘</button>
    </div>
    <div class="entry-row">
      <div class="field">
        <input type="number" id="w" step="0.1" min="30" max="250" inputmode="decimal" placeholder="000.0">
        <span class="unit">kg</span>
      </div>
      <button class="save" id="saveBtn">기록</button>
    </div>
    <div class="ack" id="ack"></div>
  </section>

  <!-- 차트 (시그니처) -->
  <section class="chart-block">
    <div class="chart-head">
      <div class="chart-title">노이즈와 추세</div>
      <div class="legend">
        <span><i class="lg-dot"></i>일일 계측값</span>
        <span><i class="lg-line"></i>7일 평균</span>
      </div>
    </div>
    <div id="chartHost"></div>
  </section>

  <!-- 주간 판정 -->
  <section class="verdict">
    <div class="v-label">주간 판정 — 수요일</div>
    <div class="v-main">
      <span class="v-delta wait" id="vDelta">—</span>
      <span class="v-tag wait" id="vTag">대기</span>
    </div>
    <div class="v-note" id="vNote"></div>
    <div class="v-cmp">
      <div><dt>이번 주 평균</dt><dd id="cThis">—</dd></div>
      <div><dt>지난 주 평균</dt><dd id="cPrev">—</dd></div>
      <div><dt>합격선</dt><dd>−0.50<small>kg</small></dd></div>
    </div>
  </section>

  <!-- 목표 -->
  <section class="prog">
    <div class="v-label">목표 구간</div>
    <div class="track">
      <div class="fill" id="fill"></div>
      <div class="pin" style="left:35.7%"><span>93</span></div>
      <div class="pin" style="left:64.3%"><span>85</span></div>
    </div>
    <div class="prog-ends"><span>103.0 시작</span><span>75.0 목표</span></div>
    <div class="v-note" id="pNote" style="margin-top:18px"></div>
  </section>

  <!-- 도구 -->
  <div class="tools">
    <button class="linkbtn" id="logBtn">기록 전체 보기</button>
    <button class="linkbtn" id="expBtn">내보내기</button>
    <button class="linkbtn" id="impBtn">불러오기</button>
  </div>
  <div class="log" id="log"></div>

  <p class="disc">
    이 앱은 전날 대비 증감을 표시하지 않습니다. 하루치 변동은 나트륨·글리코겐·소화관 내용물에 의한 측정 노이즈이며 체지방의 변화가 아니기 때문입니다.
    판정은 7일 평균끼리만 비교합니다. 기록이 14일 미만인 동안에는 기준선이 아직 형성되지 않아 판정을 내리지 않습니다.
  </p>
</div>

<script>
(function(){
  "use strict";

  /* ── 저장소: 아티팩트(window.storage) → 로컬 폴백 ── */
  var KEY="weightlog:v1";
  var store={
    async get(){
      try{
        if(window.storage&&window.storage.get){
          var r=await window.storage.get(KEY);
          return r&&r.value?JSON.parse(r.value):{};
        }
      }catch(e){ /* 키 없음 또는 미지원 */ }
      try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){ return {}; }
    },
    async set(o){
      var s=JSON.stringify(o);
      try{ if(window.storage&&window.storage.set){ await window.storage.set(KEY,s); } }catch(e){}
      try{ localStorage.setItem(KEY,s); }catch(e){}
    }
  };

  var START=103.0, GOAL=75.0, PASS=-0.5;
  var entries={};

  /* ── 날짜 유틸 ── */
  function key(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function parse(k){ var p=k.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
  function shift(d,n){ var x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
  function today(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
  var WD=["일","월","화","수","목","금","토"];

  /* ── 통계 ── */
  function windowAvg(endDate,days){
    var sum=0,n=0;
    for(var i=0;i<days;i++){
      var v=entries[key(shift(endDate,-i))];
      if(typeof v==="number"){ sum+=v; n++; }
    }
    return n?{avg:sum/n,n:n}:null;
  }
  function rollingAt(d){
    var sum=0,n=0;
    for(var i=0;i<7;i++){
      var v=entries[key(shift(d,-i))];
      if(typeof v==="number"){ sum+=v; n++; }
    }
    return n?sum/n:null;
  }
  function sortedKeys(){ return Object.keys(entries).sort(); }
  function count(){ return sortedKeys().length; }

  /* ── 차트 ── */
  function drawChart(){
    var host=document.getElementById("chartHost");
    var ks=sortedKeys();
    if(!ks.length){
      host.innerHTML='<div class="empty-chart">첫 계측값을 기록하시면 이곳에 추세가 그려집니다.</div>';
      return;
    }
    var end=today(), start=parse(ks[0]);
    var span=Math.round((end-start)/864e5);
    if(span<13){ start=shift(end,-13); span=13; }
    if(span>89){ start=shift(end,-89); span=89; }

    var pts=[],line=[];
    for(var i=0;i<=span;i++){
      var d=shift(start,i), k=key(d);
      if(typeof entries[k]==="number") pts.push({i:i,v:entries[k]});
      var r=rollingAt(d);
      if(r!==null) line.push({i:i,v:r});
    }

    var vals=pts.map(function(p){return p.v;}).concat(line.map(function(p){return p.v;}));
    var lo=Math.min.apply(null,vals), hi=Math.max.apply(null,vals);
    var pad=Math.max((hi-lo)*0.28,0.9);
    lo-=pad; hi+=pad;

    var W=700,H=260,L=44,R=12,T=14,B=26;
    var iw=W-L-R, ih=H-T-B;
    var X=function(i){ return L+(span?i/span*iw:iw/2); };
    var Y=function(v){ return T+(hi-v)/(hi-lo)*ih; };

    var s='<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="일일 계측값과 7일 평균 추세">';

    // y 눈금
    var stepC=Math.max(1,Math.ceil((hi-lo)/4*2)/2);
    var base=Math.ceil(lo/stepC)*stepC;
    for(var g=base;g<=hi;g+=stepC){
      var y=Y(g);
      s+='<line x1="'+L+'" y1="'+y.toFixed(1)+'" x2="'+(W-R)+'" y2="'+y.toFixed(1)+'" stroke="var(--grid-soft)" stroke-width="1"/>';
      s+='<text x="'+(L-9)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end" font-family="var(--mono)" font-size="10" fill="var(--ink-faint)">'+g.toFixed(1)+'</text>';
    }

    // x 라벨 (양끝)
    s+='<text x="'+L+'" y="'+(H-6)+'" font-family="var(--mono)" font-size="9.5" fill="var(--ink-faint)">'+(start.getMonth()+1)+'/'+start.getDate()+'</text>';
    s+='<text x="'+(W-R)+'" y="'+(H-6)+'" text-anchor="end" font-family="var(--mono)" font-size="9.5" fill="var(--ink-faint)">'+(end.getMonth()+1)+'/'+end.getDate()+'</text>';

    // 수요일 세로선
    for(var j=0;j<=span;j++){
      if(shift(start,j).getDay()===3){
        s+='<line x1="'+X(j).toFixed(1)+'" y1="'+T+'" x2="'+X(j).toFixed(1)+'" y2="'+(T+ih)+'" stroke="var(--grid)" stroke-width="1" stroke-dasharray="2 4"/>';
      }
    }

    // 일일 계측값 = 노이즈 (작고 흐린 빈 원)
    pts.forEach(function(p){
      s+='<circle cx="'+X(p.i).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="3" fill="none" stroke="var(--noise)" stroke-width="1.3"/>';
    });

    // 7일 평균 = 신호 (굵은 선)
    if(line.length>1){
      var d="";
      line.forEach(function(p,idx){ d+=(idx?"L":"M")+X(p.i).toFixed(1)+" "+Y(p.v).toFixed(1)+" "; });
      s+='<path d="'+d+'" fill="none" stroke="var(--signal)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>';
      var last=line[line.length-1];
      s+='<circle cx="'+X(last.i).toFixed(1)+'" cy="'+Y(last.v).toFixed(1)+'" r="4.5" fill="var(--signal)"/>';
      s+='<circle cx="'+X(last.i).toFixed(1)+'" cy="'+Y(last.v).toFixed(1)+'" r="8" fill="none" stroke="var(--signal)" stroke-width="1" opacity=".3"/>';
    }
    s+='</svg>';
    host.innerHTML=s;
  }

  /* ── 판정 ── */
  function drawVerdict(){
    var t=today();
    var a=windowAvg(t,7), b=windowAvg(shift(t,-7),7);
    var elD=document.getElementById("vDelta"), elT=document.getElementById("vTag"), elN=document.getElementById("vNote");
    document.getElementById("cThis").innerHTML = a? a.avg.toFixed(2)+'<small>kg · '+a.n+'일</small>' : "—";
    document.getElementById("cPrev").innerHTML = b? b.avg.toFixed(2)+'<small>kg · '+b.n+'일</small>' : "—";

    var n=count();
    function set(cls,txt,tag,note){
      elD.className="v-delta "+cls; elD.textContent=txt;
      elT.className="v-tag "+cls; elT.textContent=tag;
      elN.textContent=note;
    }
    if(n<14||!a||!b||a.n<4||b.n<4){
      set("wait","—","기준선 형성 중",
        "기록 "+n+"/14일. 처음 2주는 평균이 아직 안정되지 않아 판정을 내리지 않습니다. 지금은 숫자를 적기만 하시면 됩니다. 또한 초반의 급격한 감소는 글리코겐이 빠진 것이므로 그 속도가 이어지리라 기대하지 마시옵소서.");
      return;
    }
    var d=a.avg-b.avg;
    var ok=d<=PASS;
    var wed=t.getDay()===3;
    var toWed=(3-t.getDay()+7)%7;
    set(ok?"good":"hold",(d>0?"+":"−")+Math.abs(d).toFixed(2),ok?"합격":"유지",
      wed
        ? (ok? "합격선을 통과했습니다. 이 페이스를 유지하시면 됩니다."
             : "합격선에 못 미쳤습니다. 다만 한 주의 결과일 뿐이니 식단을 조이기 전에 다음 주 평균을 한 번 더 보시옵소서.")
        : "다음 판정일은 "+toWed+"일 후 수요일입니다. 그때까지는 숫자를 적기만 하시옵소서."
    );
  }

  /* ── 목표 진행 ── */
  function drawProgress(){
    var t=today(), a=windowAvg(t,7);
    var cur=a?a.avg:START;
    var pct=Math.max(0,Math.min(100,(START-cur)/(START-GOAL)*100));
    document.getElementById("fill").style.width=pct.toFixed(1)+"%";
    var left=cur-GOAL;
    var wks=left/0.5;
    document.getElementById("pNote").textContent = a
      ? "현재 7일 평균 "+cur.toFixed(2)+"kg. 목표까지 "+left.toFixed(1)+"kg 남았습니다. 주당 0.5kg 페이스 기준 약 "+Math.ceil(wks)+"주(약 "+(wks/4.35).toFixed(0)+"개월)."
      : "기록이 쌓이면 7일 평균을 기준으로 남은 거리를 계산해 드리겠습니다.";
  }

  /* ── 로그 표 ── */
  function drawLog(){
    var host=document.getElementById("log");
    var ks=sortedKeys().reverse();
    if(!ks.length){ host.innerHTML='<p style="font-size:13px;color:var(--ink-faint);padding:12px 0">기록이 없습니다.</p>'; return; }
    var h='<table><thead><tr><th>날짜</th><th>계측값</th><th>7일 평균</th><th></th></tr></thead><tbody>';
    ks.forEach(function(k){
      var d=parse(k), r=rollingAt(d);
      h+='<tr><td><button class="jump" data-k="'+k+'">'+k.slice(5)+' ('+WD[d.getDay()]+')</button></td>'
        +'<td class="w">'+entries[k].toFixed(1)+'</td>'
        +'<td class="avg">'+(r!==null?r.toFixed(2):"—")+'</td>'
        +'<td><button class="del" data-k="'+k+'" aria-label="'+k+' 기록 삭제">삭제</button></td></tr>';
    });
    host.innerHTML=h+'</tbody></table>';
    host.querySelectorAll(".del").forEach(function(b){
      b.onclick=function(){
        delete entries[b.dataset.k]; save(); render(); drawLog();
        if(typeof syncDate==="function") syncDate();
      };
    });
    host.querySelectorAll(".jump").forEach(function(b){
      b.onclick=function(){
        selDate=parse(b.dataset.k); syncDate();
        document.getElementById("w").focus();
        window.scrollTo({top:0,behavior:"smooth"});
      };
    });
  }

  function render(){ drawChart(); drawVerdict(); drawProgress(); }
  function save(){ store.set(entries); }

  /* ── 이벤트 ── */
  var input=document.getElementById("w"), ack=document.getElementById("ack");
  var dInput=document.getElementById("d"), selDate=today();

  function say(t){ ack.textContent=t; ack.classList.add("on"); }

  /* 선택된 날짜에 맞춰 입력칸·버튼 상태를 갱신 */
  function syncDate(){
    var k=key(selDate), isToday=(k===key(today()));
    dInput.value=k;
    document.getElementById("nextDay").disabled=isToday;
    document.getElementById("todayBtn").disabled=isToday;
    document.getElementById("saveBtn").textContent = (typeof entries[k]==="number")?"수정":"기록";

    if(typeof entries[k]==="number"){
      input.value=entries[k].toFixed(1);
      say((isToday?"오늘":k.slice(5)+" ("+WD[selDate.getDay()]+")")+"은 이미 기록되어 있습니다. 다시 입력하시면 덮어씁니다.");
    }else{
      input.value="";
      ack.classList.remove("on");
    }
  }

  function commit(){
    var v=parseFloat(input.value);
    if(isNaN(v)||v<30||v>250){
      say("30에서 250 사이의 값을 입력해 주시옵소서."); input.focus(); return;
    }
    if(selDate>today()){ say("미래 날짜에는 기록할 수 없습니다."); return; }

    var k=key(selDate);
    entries[k]=Math.round(v*10)/10;
    save(); render();
    if(document.getElementById("log").classList.contains("on")) drawLog();

    var isToday=(k===key(today()));
    var label=isToday?"오늘":(selDate.getMonth()+1)+"/"+selDate.getDate()+" ("+WD[selDate.getDay()]+")";
    say(label+" 기록했습니다. " + (today().getDay()===3 && isToday ? "오늘이 판정일이옵니다." : "해석은 수요일에 하시옵소서."));

    input.blur();
    document.getElementById("saveBtn").textContent="수정";
  }

  document.getElementById("saveBtn").onclick=commit;
  input.addEventListener("keydown",function(e){ if(e.key==="Enter") commit(); });

  dInput.addEventListener("change",function(){
    if(!dInput.value) return;
    var d=parse(dInput.value);
    if(isNaN(d)) return;
    if(d>today()) d=today();
    selDate=d; syncDate();
  });
  document.getElementById("prevDay").onclick=function(){ selDate=shift(selDate,-1); syncDate(); };
  document.getElementById("nextDay").onclick=function(){
    if(key(selDate)===key(today())) return;
    selDate=shift(selDate,1); syncDate();
  };
  document.getElementById("todayBtn").onclick=function(){ selDate=today(); syncDate(); };

  document.getElementById("logBtn").onclick=function(){
    var l=document.getElementById("log");
    l.classList.toggle("on");
    this.textContent=l.classList.contains("on")?"기록 접기":"기록 전체 보기";
    if(l.classList.contains("on")) drawLog();
  };
  document.getElementById("expBtn").onclick=function(){
    var blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="weightlog-"+key(today())+".json";
    a.click(); URL.revokeObjectURL(a.href);
  };
  document.getElementById("impBtn").onclick=function(){
    var f=document.createElement("input"); f.type="file"; f.accept=".json,application/json";
    f.onchange=function(){
      var file=f.files[0]; if(!file) return;
      var r=new FileReader();
      r.onload=function(){
        try{
          var o=JSON.parse(r.result), merged=0;
          Object.keys(o).forEach(function(k){
            if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&typeof o[k]==="number"){ entries[k]=o[k]; merged++; }
          });
          save(); render(); if(document.getElementById("log").classList.contains("on")) drawLog();
          ack.textContent=merged+"건을 불러왔습니다."; ack.classList.add("on");
        }catch(e){
          ack.textContent="파일을 읽지 못했습니다. 내보내기로 저장한 JSON인지 확인해 주시옵소서.";
          ack.classList.add("on");
        }
      };
      r.readAsText(file);
    };
    f.click();
  };

  /* ── 초기화 ── */
  (async function(){
    var t=today();
    document.getElementById("todayDate").textContent = key(t)+" ("+WD[t.getDay()]+")";
    dInput.max=key(t);
    entries = await store.get() || {};
    selDate=t; syncDate();
    render();
  })();
})();
</script>
</body>
</html>
